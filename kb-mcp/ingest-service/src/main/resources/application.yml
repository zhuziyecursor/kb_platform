server:
  port: 8081

spring:
  application:
    name: ingest-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:25432}/${DB_NAME:kb_knowledge}
    username: ${DB_USERNAME:kb_ingest}
    password: ${DB_PASSWORD:kb_ingest}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: ${KB_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    template:
      default-topic: file-ingest

  minio:
    endpoint: ${KB_MINIO_ENDPOINT:http://localhost:29000}
    access-key: ${KB_MINIO_ACCESS_KEY:kb_minio_admin}
    secret-key: ${KB_MINIO_SECRET_KEY:}
    bucket: ${KB_MINIO_BUCKET:kb-raw}
    presigned-url-expiry: ${KB_MINIO_PRESIGNED_URL_EXPIRY:300}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/auth}

app:
  dev-context:
    tenant-id: ${KB_DEV_TENANT_ID:dev-tenant-001}

logging:
  level:
    com.kb.ingest: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${KB_DB_HOST:localhost}:${KB_DB_PORT:25432}/${KB_DB_NAME:kb_knowledge}
    username: ${KB_DB_USERNAME:kb_ingest}
    password: ${KB_DB_PASSWORD:kb_ingest}

---
spring:
  config:
    activate:
      on-profile: dev

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KB_JWT_ISSUER_URI:http://localhost:9999}
