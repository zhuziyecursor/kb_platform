server:
  port: ${SERVER_PORT:31002}

spring:
  application:
    name: vector-service

  datasource:
    url: jdbc:postgresql://${KB_DB_HOST:localhost}:${KB_DB_PORT:25432}/${KB_DB_NAME:kb_knowledge}
    username: ${KB_DB_USERNAME:kb_vector}
    password: ${KB_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION:60000}
      pool-name: vector-pool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: kb_knowledge

  kafka:
    bootstrap-servers: ${KB_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: vector-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 32
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.kb.vector.dto.EmbedTaskMessage
    listener:
      type: batch

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KB_JWT_ISSUER_URI:http://localhost:8080/auth}

app:
  kafka:
    embed-task-topic: ${KB_KAFKA_EMBED_TASK_TOPIC:embed-task}
  search-index:
    write-enabled: ${KB_SEARCH_INDEX_WRITE_ENABLED:true}
  reconcile:
    enabled: ${KB_RECONCILE_ENABLED:true}
    cron: ${KB_RECONCILE_CRON:0 17 * * * *}

milvus:
  host: ${KB_MILVUS_HOST:localhost}
  port: ${KB_MILVUS_PORT:19530}
  collection-name: ${KB_MILVUS_COLLECTION:kb_documents}
  batch-size: 32

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  file:
    name: ${VECTOR_LOG_FILE:logs/vector-service.log}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:25MB}
      max-history: ${LOG_MAX_HISTORY:3}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:100MB}
  level:
    com.kb.vector: INFO
    org.apache.kafka.clients.NetworkClient: WARN
