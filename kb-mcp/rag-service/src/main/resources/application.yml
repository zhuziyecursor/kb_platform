server:
  port: ${RAG_SERVICE_PORT:31005}

spring:
  application:
    name: rag-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:25432/kb_knowledge}
    username: ${DB_USERNAME:kb_rag}
    password: ${DB_PASSWORD:kb_rag}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: kb_knowledge

  data:
    redis:
      host: ${KB_REDIS_HOST:localhost}
      port: ${KB_REDIS_PORT:26379}
      password: ${KB_REDIS_PASSWORD:}

app:
  dev-context:
    user-id: ${KB_DEV_USER_ID:current-user}
    sec-level: ${KB_DEV_SEC_LEVEL:5}
    perm-group-ids: ${KB_DEV_PERM_GROUP_IDS:1}
    user-groups: ${KB_DEV_USER_GROUPS:}

  milvus:
    host: ${KB_MILVUS_HOST:localhost}
    port: ${KB_MILVUS_PORT:19530}
    collection-name: ${KB_MILVUS_COLLECTION:kb_documents}

  embedding:
    url: ${KB_EMBEDDING_SERVICE_URL:http://localhost:31296}/embeddings
    timeout-seconds: ${KB_EMBEDDING_TIMEOUT_SECONDS:30}
    model-name: ${KB_EMBEDDING_MODEL_NAME:BGE-zh-v1.5}
    dim: ${KB_EMBEDDING_DIM:1024}
    max-retries: ${KB_EMBEDDING_MAX_RETRIES:3}

  rerank:
    url: ${KB_RERANK_SERVICE_URL:http://localhost:31003}/rerank/v1/rerank
    timeout-seconds: ${KB_RERANK_TIMEOUT_SECONDS:30}
    max-retries: ${KB_RERANK_MAX_RETRIES:3}
    min-score: ${KB_RAG_RERANK_MIN_SCORE:0.3}
    final-top-k: ${KB_RAG_RERANK_FINAL_TOP_K:5}

  llm:
    url: ${KB_LLM_GATEWAY_URL:http://localhost:31004}/llm/v1/chat/completions
    timeout-seconds: ${KB_LLM_TIMEOUT_SECONDS:60}
    temperature: ${KB_LLM_TEMPERATURE:0.3}
    max-tokens: ${KB_LLM_MAX_TOKENS:2048}
    model: ${KB_LLM_MODEL:MiniMax-M2.7}
    max-retries: ${KB_LLM_MAX_RETRIES:2}
    prompt-budget:
      enabled: ${RAG_PROMPT_BUDGET_ENABLED:true}
      context-window-tokens: ${RAG_CONTEXT_WINDOW_TOKENS:8192}
      safety-margin-tokens: ${RAG_PROMPT_SAFETY_MARGIN_TOKENS:512}
      input-budget-ratio: ${RAG_PROMPT_INPUT_BUDGET_RATIO:0.75}
      history-budget-ratio: ${RAG_PROMPT_HISTORY_BUDGET_RATIO:0.15}
      max-history-turns: ${RAG_PROMPT_MAX_HISTORY_TURNS:6}
      max-citations: ${RAG_PROMPT_MAX_CITATIONS:8}
      max-tokens-per-citation: ${RAG_PROMPT_MAX_TOKENS_PER_CITATION:900}
      min-tokens-per-citation: ${RAG_PROMPT_MIN_TOKENS_PER_CITATION:120}
      message-overhead-tokens: ${RAG_PROMPT_MESSAGE_OVERHEAD_TOKENS:8}
      citation-header-overhead-tokens: ${RAG_PROMPT_CITATION_HEADER_OVERHEAD_TOKENS:40}

  cache:
    ttl-minutes: ${RAG_CACHE_TTL_MINUTES:10}

  session:
    ttl-seconds: ${RAG_SESSION_TTL_SECONDS:1800}
    max-turns: ${RAG_MAX_SESSION_TURNS:10}

  refusal:
    confidence-threshold: ${RAG_CONFIDENCE_THRESHOLD:0.3}

logging:
  level:
    com.kb.rag: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
