openapi: 3.0.3
info:
  title: rag-service API
  version: v1
  description: |
    RAG 检索与问答服务接口。

    接收用户问题，经过向量检索、Rerank 精排、ACL 过滤后，结合 LLM 生成带引用的答案。

    **不直接访问 PostgreSQL（除 doc_acl 只读），不直接访问 MinIO。**

servers:
  - url: /rag/v1

security:
  - oboToken: []

components:
  securitySchemes:
    oboToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "OBO token (aud=mcp-kb, scope=kb:search)"

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:    { type: string }
        message: { type: string }
        traceId: { type: string }

    Citation:
      type: object
      description: 答案引用的知识来源
      required: [docId, chunkSeq, title, version, page, score, text, isCurrent]
      properties:
        docId:         { type: string, example: "DOC123" }
        chunkSeq:      { type: integer, example: 12 }
        title:         { type: string, example: "采购制度" }
        version:       { type: integer, example: 7 }
        page:          { type: integer, example: 3 }
        sectionPath:   { type: string, example: "1/1.2/1.2.3", description: "章节路径" }
        regionCode:    { type: string, example: "CN-NATIONAL" }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo:   { type: string, format: date, nullable: true, description: "null 表示永久有效" }
        isCurrent:     { type: boolean, description: "文档是否为当前有效版本" }
        score:         { type: number, format: float, example: 0.78, description: "相关性分数" }
        text:          { type: string, description: "对应的原始文本片段" }
        knowledgeSpaceId: { type: string, description: "所属知识空间 ID" }
        spacePath:     { type: string, description: "知识空间路径，如 审计案例库/案例评优" }
        sourceChannels:
          type: array
          items: { type: string, enum: [DENSE, SPARSE, STRUCTURED, METADATA, FAQ] }
          description: "召回来源通道列表（可选，Sprint 2+）"
        channelRanks:
          type: object
          additionalProperties: { type: integer }
          description: "各通道内排名（可选，Sprint 2+）"

    RefusalReason:
      type: string
      enum: [NO_MATCH, NO_PERMISSION, LOW_CONFIDENCE]
      description: |
        - NO_MATCH: 知识库中没有相关内容
        - NO_PERMISSION: 有内容但用户无权访问
        - LOW_CONFIDENCE: 召回质量分低于阈值

paths:
  /chat:
    post:
      summary: 知识问答
      description: |
        完整 RAG 流程：
        1. Query 改写（同义词扩展）
        2. 关键词兜底（精确匹配条款编号/制度名称）
        3. Milvus 向量检索 Top20 + ACL 预过滤
        4. BGE-Reranker 精排 Top20→Top5
        5. ACL 二次校验（doc_acl 表）
        6. 拒答判断
        7. 构造 Prompt → llm-gateway → LLM 生成答案

        **ACL 过滤规则（Milvus filter 必须包含）：**
        ```
        tenant_id == '{tenant_id}' AND
        sec_level <= {user_sec_level} AND
        perm_group_id in [{perm_group_ids}] AND
        (effective_to is null OR effective_to > '{today}')
        ```
      operationId: ragChat
      security:
        - oboToken: [kb:search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, query]
              properties:
                tenantId:  { type: string, example: "t1" }
                sessionId: { type: string, example: "s-001", description: "会话ID，用于多轮对话上下文" }
                biz:       { type: string, example: "audit", description: "业务域" }
                lang:      { type: string, default: "zh", enum: [zh, en] }
                query:     { type: string, example: "采购合同审批流程是什么？" }
                topK:      { type: integer, default: 20, maximum: 50, description: "Milvus 召回数量" }
                spaceId:   { type: string, description: "限定检索范围的知识空间 ID（含子树），不传则全库检索" }
      responses:
        "200":
          description: 成功返回答案（含拒答情况）
          content:
            application/json:
              schema:
                type: object
                required: [answer, citations, traceId]
                properties:
                  answer:
                    type: string
                    description: "LLM 生成的答案，或拒答说明"
                    example: "根据《采购管理办法》..."
                  citations:
                    type: array
                    items: { $ref: "#/components/schemas/Citation" }
                    description: "为空表示拒答"
                  traceId:
                    type: string
                    description: "全链路追踪ID，所有情况（含拒答）都必须返回"
                  reason:
                    $ref: "#/components/schemas/RefusalReason"
                    description: "仅拒答时返回"
                  intent:
                    type: string
                    enum: [POLICY_QA, DOC_SEARCH, CHITCHAT]
                    description: "意图分类（A.6 意图路由）"
                  searchMode:
                    type: string
                    enum: [DENSE, BM25, HYBRID, FAQ, CHITCHAT, STRUCTURED_FAST]
                    description: "实际使用的检索模式"
                  channelStats:
                    type: object
                    additionalProperties: { type: integer }
                    description: "各通道命中统计（可选，Sprint 2+）"
              examples:
                success:
                  summary: 正常回答
                  value:
                    answer: "根据《采购管理办法》第3章，采购合同审批流程为..."
                    citations:
                      - docId: "DOC123"
                        chunkSeq: 12
                        title: "采购制度"
                        version: 7
                        page: 3
                        sectionPath: "1/1.2/1.2.3"
                        regionCode: "CN-NATIONAL"
                        effectiveFrom: "2026-01-01"
                        effectiveTo: null
                        isCurrent: true
                        score: 0.78
                        text: "采购合同应按照以下流程审批..."
                    traceId: "tr-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                no_match:
                  summary: 拒答（无相关内容）
                  value:
                    answer: "知识库中暂时没有找到相关资料"
                    citations: []
                    traceId: "tr-xxx"
                    reason: "NO_MATCH"
                no_permission:
                  summary: 拒答（无权限）
                  value:
                    answer: "您没有权限查看相关内容"
                    citations: []
                    traceId: "tr-xxx"
                    reason: "NO_PERMISSION"
        "401":
          description: OBO token 无效或过期
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: scope 不足（需要 kb:search）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /sessions:
    get:
      summary: 获取会话列表
      operationId: listSessions
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
        - name: userId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 会话列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sessionId: { type: string }
                    title: { type: string }
                    createdAt: { type: integer, format: int64 }
                    updatedAt: { type: integer, format: int64 }
    post:
      summary: 创建新会话
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, userId]
              properties:
                tenantId: { type: string }
                userId: { type: string }
      responses:
        "200":
          description: 会话 ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string }

  /sessions/{sessionId}/messages:
    get:
      summary: 获取会话消息
      operationId: getSessionMessages
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 消息列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    role: { type: string }
                    content: { type: string }
                    citations: { type: string, description: "JSON 字符串" }
                    traceId: { type: string }
                    createdAt: { type: integer, format: int64 }

  /sessions/{sessionId}:
    delete:
      summary: 删除会话及其消息
      operationId: deleteSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
      responses:
        "204":
          description: 删除成功

  /analytics/top-queries:
    get:
      summary: 高频问题统计
      operationId: getTopQueries
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
        - name: days
          in: query
          required: false
          schema: { type: integer, default: 7 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20 }
        - name: spaceId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Top queries list

  /analytics/dashboard:
    get:
      summary: 监控仪表盘指标
      description: |
        返回指定周期的全景指标：
        - 请求量、成功率、平均响应时间、拒答率
        - 反馈统计（点赞/点踩/报错）
        - 慢查询 Top N（含 P95）
        - 拒答趋势（today 按小时，7days/30days 按天）
        - 请求趋势
      operationId: getDashboardMetrics
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [today, 7days, 30days]
            default: 7days
        - name: slowQueryLimit
          in: query
          required: false
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

    # ========== Dashboard Schemas ==========

    DashboardMetrics:
      type: object
      properties:
        period:
          type: string
          enum: [today, 7days, 30days]
        totalRequests:
          type: integer
          format: int64
        successRate:
          type: number
          format: double
        avgResponseMs:
          type: number
          format: double
        refusalRate:
          type: number
          format: double
        feedbackStats:
          $ref: "#/components/schemas/FeedbackStats"
        topSlowQueries:
          type: array
          items:
            $ref: "#/components/schemas/SlowQuery"
        refusalTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        requestTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"

    FeedbackStats:
      type: object
      properties:
        likeCount:     { type: integer, format: int64 }
        dislikeCount:  { type: integer, format: int64 }
        reportCount:   { type: integer, format: int64 }
        likeRate:      { type: number, format: double }

    SlowQuery:
      type: object
      properties:
        query:  { type: string }
        avgMs:  { type: number, format: double }
        count:  { type: integer, format: int64 }
        p95Ms:  { type: number, format: double }

    TrendPoint:
      type: object
      properties:
        label:  { type: string, description: "HH:00 for hourly, YYYY-MM-DD for daily" }
        value:  { type: number, format: double }
        count:  { type: integer, format: int64 }
